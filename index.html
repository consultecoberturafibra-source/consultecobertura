<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulte Cobertura Fibra | Ultra Velocidade</title>
    <!-- Ícones e Fontes Extras -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020512;
            --accent-blue: #0099ff;
            --neon-green: #00ff3c;
            --text-white: #ffffff;
            --glow-blue: 0 0 25px rgba(0, 153, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 15%, #081b42 0%, var(--bg-color) 70%);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Alerta de Urgência no Topo */
        .top-bar-urgente {
            background: linear-gradient(90deg, #ff0044, #ff5500);
            width: 100%;
            text-align: center;
            padding: 11px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 0, 68, 0.4);
            z-index: 10;
        }

        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
            padding: 25px 15px;
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(6, 12, 32, 0.85);
            border: 2px solid #102e6b;
            border-radius: 32px;
            padding: 35px 24px;
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.9);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Título Ajustado Conforme Solicitação */
        .header-brand {
            margin-bottom: 25px;
        }

        .header-brand .sub-brand {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-blue);
            font-weight: 800;
            text-shadow: var(--glow-blue);
        }

        .header-brand .main-name {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-white);
            text-transform: uppercase;
            line-height: 1.2;
            margin-top: 5px;
            letter-spacing: -0.5px;
        }

        .header-brand .main-name span {
            display: block;
            font-size: 20px;
            color: var(--accent-blue);
            text-shadow: var(--glow-blue);
            margin-top: 4px;
        }

        /* Roteador Futurista com Fundo IPv6 */
        .router-image-container {
            width: 100%;
            max-width: 240px;
            margin: 0 auto 20px auto;
            position: relative;
        }

        /* Efeito de Brilho IPv6 no Fundo */
        .router-image-container::before {
            content: 'IPv6 READY';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 900;
            font-style: italic;
            color: rgba(0, 153, 255, 0.12);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 153, 255, 0.6);
            z-index: 0;
            white-space: nowrap;
        }

        .router-image-container img {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0px 10px 25px rgba(0, 153, 255, 0.6));
            animation: floatAnimation 3s infinite ease-in-out;
        }

        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* SUPER CTA WHATSAPP PULSANTE */
        .cta-box-wrapper {
            margin-bottom: 24px;
        }

        .btn-whats-premium {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: linear-gradient(180deg, #00ff4c 0%, #009c2e 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 35px rgba(0, 255, 76, 0.6);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulseButton 1.5s infinite ease-in-out;
        }

        @keyframes pulseButton {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 40px rgba(0, 255, 76, 0.8); }
            100% { transform: scale(1); }
        }

        /* Bloco de Oferta com Globoplay Embutido do Lado Direito */
        .oferta-flex-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .oferta-card-premium {
            flex: 1;
            background: rgba(4, 9, 26, 0.9);
            border: 2px solid #143575;
            border-radius: 24px;
            padding: 20px 15px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 153, 255, 0.15);
        }

        .display-mega {
            font-size: 65px;
            font-weight: 900;
            line-height: 0.85;
            font-style: italic;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 30%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .display-submega {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .preco-tag-principal {
            font-size: 68px;
            font-weight: 900;
            line-height: 0.85;
            color: #ffffff;
        }

        .preco-tag-principal span {
            font-size: 22px;
            font-weight: 800;
            vertical-align: super;
        }

        .preco-tag-principal small {
            font-size: 16px;
            color: #a4b3cd;
        }

        /* Card Destaque Globoplay do Lado Direito */
        .badge-globoplay-direito {
            width: 110px;
            align-self: stretch;
            background: linear-gradient(135deg, #ff4500 0%, #ff0044 100%);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-shadow: 0 8px 25px rgba(255, 0, 68, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge-globoplay-direito i {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 8px;
            animation: pulseIcon 2s infinite alternate;
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .badge-globoplay-text {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .badge-globoplay-sub {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 2px;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Recursos e Benefícios */
        .grid-recursos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .recurso-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 153, 255, 0.25);
            padding: 12px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .recurso-tag i {
            color: var(--accent-blue);
        }

        /* Formulário de Verificação */
        .secao-busca-titulo {
            font-size: 13px;
            font-weight: 700;
            color: #8397b5;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .input-premium-endereco {
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            border: 2px solid #143575;
            background-color: rgba(4, 9, 26, 0.95);
            color: white;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
        }

        .input-premium-endereco:focus {
            border-color: var(--accent-blue);
            box-shadow: var(--glow-blue);
        }

        .btn-premium-endereco {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-premium-endereco:hover {
            background: var(--accent-blue);
            color: white;
            box-shadow: var(--glow-blue);
        }
    </style>
</head>
<body>

    <!-- AVISO COM GATILHO DE MÁXIMA URGÊNCIA -->
    <div class="top-bar-urgente">
        <i class="fas fa-bolt"></i> Instalação Grátis Disponível Apenas Para Hoje!
    </div>

    <div class="main-wrapper">
        <div class="container">
            
            <!-- TITULO CORRIGIDO COM SUCESSO -->
            <div class="header-brand">
                <span class="sub-brand">INTERNET FIBRA ÓPTICA</span>
                <h1 class="main-name">CONSULTE COBERTURA FIBRA <span>COM DISPONÍVEL EM TODO O BRASIL</span></h1>
            </div>

            <!-- IMAGEM DO ROTEADOR FUTURISTA + FUNDO NEON IPV6 -->
            <div class="router-image-container">
                <img src="https://i.postimg.cc/9Q6g7Yg6/router-wifi6.png" alt="Roteador Ultra Wifi 6" onerror="this.src='https://cdn-icons-png.flaticon.com/512/831/831276.png'">
            </div>

            <!-- BOTÃO DE WHATSAPP PRINCIPAL -->
            <div class="cta-box-wrapper">
                <a href="https://wa.me/554140428928?text=Quero%20aproveitar%20a%20oferta%20de%20500%20MEGA%20com%20Globoplay%20e%20consultar%20disponibilidade!" class="btn-whats-premium" target="_blank">
                    <i class="fab fa-whatsapp" style="font-size: 24px;"></i> CONSULTAR NO WHATSAPP
                </a>
            </div>

            <!-- CONTEINER FLEX: OFERTA + GLOBO PLAY INCLUSO DO LADO DIREITO -->
            <div class="oferta-flex-container">
                <!-- Card com o Preço -->
                <div class="oferta-card-premium">
                    <div class="display-mega">500</div>
                    <div class="display-submega">MEGA</div>
                    <div class="preco-tag-principal"><span>R$</span>90<small>/mês</small></div>
                </div>
                
                <!-- Destaque do Lado Direito: Globo Play Incluso -->
                <div class="badge-globoplay-direito">
                    <i class="fas fa-tv"></i>
                    <div class="badge-globoplay-text">Globo<br>Play</div>
                    <div class="badge-globoplay-sub">INCLUSO</div>
                </div>
            </div>

            <!-- GRID DE BENEFÍCIOS -->
            <div class="grid-recursos">
                <div class="recurso-tag"><i class="fas fa-check-circle"></i> PREÇO FIXO</div>
                <div class="recurso-tag"><i class="fas fa-bolt"></i> ULTRA WI-FI 6</div>
            </div>

            <!-- CONSULTA SECUNDÁRIA DE ENDEREÇO -->
            <div class="secao-busca-titulo">Ou verifique seu endereço abaixo</div>
            <form id="formularioGeral">
                <input type="text" id="campoEndereco" class="input-premium-endereco" placeholder="Digite seu CEP ou Cidade/Rua" required>
                <button type="submit" class="btn-premium-endereco">
                    <i class="fas fa-map-marker-alt"></i> Verificar Cobertura
                </button>
            </form>

        </div>
    </div>

    <script>
        var configWhatsApp = "554140428928"; 

        document.getElementById('formularioGeral').addEventListener('submit', function(event) {
            event.preventDefault();
            var enderecoDigitado = document.getElementById('campoEndereco').value;
            var mensagemCompleta = encodeURIComponent("Olá! Gostaria de validar a viabilidade de 500 MEGA com Globoplay para este endereço: " + enderecoDigitado);
            var urlRedirecionamento = "https://wa.me/" + configWhatsApp + "?text=" + mensagemCompleta;
            window.open(urlRedirecionamento, '_blank');
        });
    </script>

</body>
</html>
`
