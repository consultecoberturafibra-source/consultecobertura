<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulte Cobertura Fibra | Oferta Especial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #060913;
            --accent-blue: #0099ff;
            --neon-green: #00ff2b;
            --text-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Alerta de Urgência no Topo para Tráfego Pago */
        .top-alert {
            background: linear-gradient(90deg, #ff0055, #ff5500);
            width: 100%;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        /* Container Principal */
        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: radial-gradient(circle at top, #0e2246 0%, var(--bg-color) 85%);
            border: 2px solid #1e355e;
            border-radius: 24px;
            padding: 35px 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* Nome da Sua Empresa */
        .brand-title {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-white);
            margin-bottom: 25px;
            line-height: 1.2;
        }

        .brand-title span {
            color: var(--accent-blue);
            display: block;
            font-size: 32px;
        }

        /* SUPER CTA WHATSAPP NO TOPO (MÁXIMO DE CONVERSÃO) */
        .cta-top-box {
            background: rgba(13, 21, 39, 0.9);
            border: 2px dashed var(--neon-green);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 43, 0.1);
        }

        .btn-whatsapp-giant {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: linear-gradient(180deg, #00ff2b 0%, #00991a 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 20px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 255, 43, 0.6);
            transition: 0.3s;
            animation: pulse 1.5s infinite;
        }

        .btn-whatsapp-giant:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 255, 43, 0.9);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 0 35px rgba(0, 255, 43, 0.8); }
            100% { transform: scale(1); }
        }

        /* Bloco da Oferta */
        .promo-badge {
            background: #0d1527;
            border: 1px solid #1e355e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .offer-headline {
            font-size: 65px;
            font-weight: 900;
            line-height: 0.9;
            font-style: italic;
        }

        .offer-subline {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .price-container {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            color: #a0aec0;
        }

        .price-main {
            font-size: 75px;
            font-weight: 900;
            line-height: 1;
            color: var(--text-white);
        }

        .price-main span {
            font-size: 26px;
            font-weight: 700;
            vertical-align: super;
        }

        /* Benefícios */
        .benefits-row {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .benefit-item i {
            color: var(--accent-blue);
            margin-right: 5px;
        }

        /* Segunda Opção: Formulário de Endereço */
        .search-box-title {
            font-size: 14px;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: 2px solid #1e355e;
            background-color: rgba(13, 21, 39, 0.8);
            color: white;
            font-size: 15px;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
        }

        .btn-secondary {
            width: 100%;
            background: transparent;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 14px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: var(--accent-blue);
            color: white;
        }
    </style>
</head>
<body>

    <div class="top-alert">
        <i class="fas fa-bolt"></i> Oferta Exclusiva - Instalação Grátis Hoje!
    </div>

    <div class="main-wrapper">
        <div class="container">
            
            <h1 class="brand-title">
                Provedor
                <span>Consulte Cobertura Fibra</span>
            </h1>

            <div class="cta-top-box">
                <a href="#" class="btn-whatsapp-giant" id="linkWhatsTopo" target="_blank">
                    <i class="fab fa-whatsapp"></i> Contratar Via WhatsApp
                </a>
            </div>

            <div class="promo-badge">
                <div class="offer-headline">500</div>
                <div class="offer-subline">Mega</div>
                <div class="price-container">
                    por apenas
                    <div class="price-main"><span>R$</span>90<small style="font-size: 16px;">/mês</small></div>
                </div>
            </div>

            <div class="benefits-row">
                <div class="benefit-item"><i class="fas fa-check-circle"></i> Preço Fixo</div>
                <div class="benefit-item"><i class="fas fa-check-circle"></i> Wi-Fi 6 Grátis</div>
            </div>

            <div class="search-box-title">Ou digite o endereço abaixo</div>
            <form id="formProprio">
                <input type="text" id="enderecoCliente" class="input-field" placeholder="Seu CEP ou Nome da Rua + Nº" required>
                <button type="submit" class="btn-secondary">
                    <i class="fas fa-map-marker-alt"></i> Verificar Endereço
                </button>
            </form>

        </div>
    </div>

    <script>
        // ==========================================
        // ADICIONE O SEU NÚMERO DO WHATSAPP AQUI!
        // Formato: Código do país (55) + DDD + Número. Exemplo: "5599981234567"
        // ==========================================
        var meuWhatsApp = "5599981234567"; 

        // Atualiza dinamicamente o botão do topo
        document.getElementById('linkWhatsTopo').href = "https://wa.me/" + meuWhatsApp + "?text=Quero%20aproveitar%20a%20oferta%20de%20500%20MEGA%20por%20R%24%2090%20e%20consultar%20a%20minha%20cobertura!";

        // Função do formulário de endereço
        document.getElementById('formProprio').addEventListener('submit', function(e) {
            e.preventDefault();
            var local = document.getElementById('enderecoCliente').value;
            var msg = encodeURIComponent("Olá! Gostaria de validar a viabilidade da internet de 500 MEGA para este endereço: " + local);
            var linkFinal = "https://wa.me/" + meuWhatsApp + "?text=" + msg;
            window.open(linkFinal, '_blank');
        });
    </script>

</body>
</html>
