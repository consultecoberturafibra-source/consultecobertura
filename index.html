<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#050816;
color:#fff;
text-align:center;

background-image:
radial-gradient(circle at top,#0b5fff 0%,transparent 35%),
linear-gradient(#050816,#02040b);

}

.container{

max-width:600px;
margin:auto;
padding:30px 20px 120px;

}

.logo{

font-size:42px;
font-weight:900;
color:#00b7ff;
margin-top:10px;

}

.local{

font-size:22px;
margin:25px 0;
font-weight:bold;
}

.titulo{

font-size:48px;
font-weight:900;
line-height:1.1;
margin-top:10px;

}

.preco{

font-size:65px;
font-weight:900;
color:#54ff42;
margin:30px 0;

}

.info{

font-size:22px;
line-height:42px;
margin-bottom:35px;

}

.botao{

display:block;

width:100%;

padding:24px;

background:#25D366;

color:white;

font-size:32px;

font-weight:bold;

border-radius:18px;

text-decoration:none;

box-shadow:0 0 35px rgba(37,211,102,.6);

animation:pulse 1.2s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.04);}
100%{transform:scale(1);}

}

.sub{

margin-top:18px;
font-size:18px;
opacity:.9;

}

img{

width:100%;
max-width:340px;
margin-top:40px;

}

.fixo{

position:fixed;
left:0;
bottom:-120px;
width:100%;
padding:14px;
background:#000;
box-shadow:0 -5px 20px rgba(0,0,0,.4);
transition:0.4s;
z-index:999;

}

.fixo.mostrar{

bottom:0;

}

.fixo a{

display:block;

max-width:700px;

margin:auto;

background:#25D366;

padding:18px;

font-size:28px;

font-weight:bold;

border-radius:15px;

text-decoration:none;

color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

CONSULTE COBERTURA FIBRA

</div>

<div class="local">

📍 INTERNET DISPONÍVEL NO SEU BAIRRO

</div>

<div class="titulo">

CONSULTE AGORA<br>
A COBERTURA

</div>

<a class="botao" href="https://wa.me/554140428928?text=Olá! Quero consultar a cobertura da fibra no meu endereço.">

📲 CONSULTAR COBERTURA NO WHATSAPP

</a>

<div class="sub">

Resposta em poucos minutos ✅

</div>

<div class="preco">

500 MEGA<br>

R$ 90/mês

</div>

<div class="info">

✅ Instalação Grátis<br>

✅ Wi-Fi 6 Incluso<br>

✅ Fibra 100%<br>

✅ Atendimento Humanizado

</div>

<img src="https://images.unsplash.com/photo-1624958723474-7db6f1f4db16?w=900">

</div>

<div class="fixo">

<a href="https://wa.me/554140428928?text=Olá! Quero consultar a cobertura da fibra no meu endereço.">

🟢 CONSULTAR AGORA

</a>

</div>
<script>

const botaoFixo = document.querySelector(".fixo");

window.addEventListener("scroll", function(){

    if(window.scrollY > 400){
        botaoFixo.classList.add("mostrar");
    }else{
        botaoFixo.classList.remove("mostrar");
    }

});

</script>
</body>
</html>
